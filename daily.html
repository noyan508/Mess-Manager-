<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডেইলি বাজার ও হিসাব</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="daily.css">
</head>
<body>
    
    
    <div class="form-section">
            <h2>বাজারের এন্ট্রি ফর্ম</h2>
    
             <label for="name">পণ্যের নাম নির্বাচন করুন:</label>
                <select id="name" onchange="checkDropdown(this)">
                    <option value="" disabled selected>--- পণ্য বেছে নিন ---</option>
                    <option value="rice">চাল (Rice)</option>
                    <option value="oil">তেল (Oil)</option>
                    <option value="fish">মাছ (Fish)</option>
                    <option value="meat">মাংস (Meat)</option>
                    <option value="vegetables">তরকারি (Vegetables)</option>
                    <option value="add-new" style="font-weight: bold; color: #3498db;">+ নতুন অপশন যোগ করুন</option>
                </select>
            

            
                <label for="taka">টাকা (পরিমাণ):</label>
                <input type="number" id="taka" placeholder="কত টাকা বাজার করলেন?">
            

            <input type="hidden" id="month">
            <input type="hidden" id="year">
          <div>
             <button type="button" class="submit-btn" onclick="dailyBazar()">হিসাব জমা করুন</button>
          </div>
    
    <div class="table-data">
         <h3>বাজারের তালিকা</h3>
                <div class="table-scroll">
            <table id="report-section">
                <thead>
                    <tr>
                        <th>পণ্যের নাম</th>
                        <th>তারিখ</th>
                        <th>টাকা (৳)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
           
              <tr>
                <th colspan="2">মোট :</th>
                 <th id="totalPrice">0</th>
               </tr>
             </table>
                </div>
        </div>
    </div>
        <script type="module" src="app-sync.js"></script>
    <script type="module" src="daily.js"></script>

</body>
</html>
